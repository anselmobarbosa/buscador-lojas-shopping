<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buscador de Lojas - Shopping</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f4f4f0;
    --surface: #ffffff;
    --border: rgba(0,0,0,0.1);
    --border-hover: rgba(0,0,0,0.2);
    --text-primary: #1a1a1a;
    --text-secondary: #666;
    --text-hint: #999;
    --accent: #1F3864;
    --accent-light: #e8edf5;
    --green-bg: #E1F5EE;
    --green-text: #0F6E56;
    --amber-bg: #FAEEDA;
    --amber-text: #854F0B;
    --radius-md: 8px;
    --radius-lg: 12px;
  }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
  }

  header {
    background: var(--accent);
    padding: 1.5rem 1rem;
    text-align: center;
    color: white;
  }

  header h1 {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 0.3px;
    margin-bottom: 4px;
  }

  header p {
    font-size: 13px;
    opacity: 0.7;
  }

  .container {
    max-width: 680px;
    margin: 0 auto;
    padding: 1.5rem 1rem 3rem;
  }

  .search-wrap {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.25rem;
    margin-bottom: 1.25rem;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }

  .search-row {
    display: flex;
    gap: 8px;
  }

  .search-row input {
    flex: 1;
    font-size: 15px;
    padding: 10px 14px;
    border: 1px solid var(--border-hover);
    border-radius: var(--radius-md);
    outline: none;
    background: var(--bg);
    color: var(--text-primary);
    font-family: inherit;
    transition: border-color 0.15s;
  }

  .search-row input:focus {
    border-color: var(--accent);
    background: white;
  }

  .search-row input::placeholder { color: var(--text-hint); }

  .search-row button {
    padding: 10px 18px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--radius-md);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: inherit;
    transition: opacity 0.15s;
  }

  .search-row button:hover { opacity: 0.88; }
  .search-row button:active { transform: scale(0.97); }

  .hint {
    font-size: 12px;
    color: var(--text-hint);
    margin-top: 10px;
    line-height: 1.5;
  }

  .count {
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 10px;
    padding-left: 2px;
  }

  .result-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1rem 1.25rem;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: box-shadow 0.15s, border-color 0.15s;
  }

  .result-card:hover {
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    border-color: var(--border-hover);
  }

  .result-icon {
    width: 44px;
    height: 44px;
    border-radius: var(--radius-md);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 20px;
  }

  .icon-ativo { background: var(--green-bg); color: var(--green-text); }
  .icon-vaga  { background: var(--amber-bg); color: var(--amber-text); }

  .result-info { flex: 1; min-width: 0; }

  .result-name {
    font-size: 16px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .result-meta {
    font-size: 13px;
    color: var(--text-secondary);
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }

  .meta-item {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 99px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }

  .badge-ativo { background: var(--green-bg); color: var(--green-text); }
  .badge-vaga  { background: var(--amber-bg); color: var(--amber-text); }

  .empty {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--text-secondary);
  }

  .empty i {
    font-size: 42px;
    display: block;
    margin-bottom: 12px;
    opacity: 0.3;
    color: var(--text-primary);
  }

  .empty p { font-size: 15px; margin-bottom: 6px; }
  .empty small { font-size: 13px; color: var(--text-hint); }

  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 1.25rem;
  }

  .stat-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-md);
    padding: 12px;
    text-align: center;
  }

  .stat-num {
    font-size: 22px;
    font-weight: 700;
    color: var(--accent);
  }

  .stat-label {
    font-size: 11px;
    color: var(--text-hint);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 2px;
  }

  @media (max-width: 480px) {
    header h1 { font-size: 17px; }
    .result-name { font-size: 15px; }
    .search-row button span { display: none; }
  }
</style>
</head>
<body>

  <p>Consulte lojas por número de unidade ou nome</p>
</header>

    <p class="hint">

const andarLabel = { "G1": "Piso G1", "L1": "Piso L1", "L2": "Piso L2", "L3": "Piso L3" };

const total = lojas.length;
const ativas = lojas.filter(l => l[3] === "ATIVO").length;
const vagas  = lojas.filter(l => l[3] === "VAGA").length;

document.getElementById('stats').innerHTML = `
  <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-label">Total de unidades</div></div>
  <div class="stat-card"><div class="stat-num" style="color:#0F6E56">${ativas}</div><div class="stat-label">Lojas ativas</div></div>
  <div class="stat-card"><div class="stat-num" style="color:#854F0B">${vagas}</div><div class="stat-label">Vagas</div></div>
`;

function norm(s){ return s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").trim(); }

function buscar(){
  const q = norm(document.getElementById('q').value);
  const div = document.getElementById('resultado');
  if(!q){ div.innerHTML=''; return; }

  const res = lojas.filter(([andar, unidades, loja]) => {
    const uns = unidades.split('/');
    return uns.some(u => norm(u) === q || norm(u).includes(q))
      || norm(unidades).includes(q)
      || norm(loja).includes(q);
  });

  if(!res.length){
    div.innerHTML = `<div class="empty">
      <i class="ti ti-building-store"></i>
      <p>Nenhuma loja encontrada para "<strong>${document.getElementById('q').value}</strong>"</p>
      <small>Tente outro número ou parte do nome da loja.</small>
    </div>`;
    return;
  }

  div.innerHTML = `<p class="count">${res.length} resultado${res.length>1?'s':''} encontrado${res.length>1?'s':''}</p>` +
    res.map(([andar, unidades, loja, status]) => {
      const isVaga = status === 'VAGA';
      return `<div class="result-card">
        <div class="result-icon ${isVaga?'icon-vaga':'icon-ativo'}">
          <i class="ti ${isVaga?'ti-door-off':'ti-building-store'}"></i>
        </div>
        <div class="result-info">
          <div class="result-name">${loja}</div>
          <div class="result-meta">
            <span class="meta-item"><i class="ti ti-map-pin" style="font-size:13px"></i> ${andarLabel[andar]||andar}</span>
            <span class="meta-item"><i class="ti ti-hash" style="font-size:13px"></i> Unidade ${unidades}</span>
            <span class="badge ${isVaga?'badge-vaga':'badge-ativo'}">
              <i class="ti ${isVaga?'ti-circle-off':'ti-circle-check'}" style="font-size:11px"></i>
              ${isVaga?'Vaga':'Ativo'}
            </span>
          </div>
        </div>
      </div>`;
    }).join('');
}

document.getElementById('q').addEventListener('keydown', e => { if(e.key==='Enter') buscar(); });
document.getElementById('q').addEventListener('input', () => {
  if(!document.getElementById('q').value) document.getElementById('resultado').innerHTML='';
});
